<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Painel de Tarefas</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
  />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <nav class="navbar navbar-expand-lg bg-white border-bottom sticky-top">
    <div class="container">
      <span class="navbar-brand fw-bold">Painel de Tarefas</span>
      <span class="badge text-bg-dark" id="contador-tarefas">0 tarefas</span>
    </div>
  </nav>

  <main class="container py-5">
    <div class="row g-4">
      <div class="col-lg-4">
        <div class="card shadow-sm border-0 h-100">
          <div class="card-body">
            <h1 class="h4 mb-3">Nova tarefa</h1>

            <form id="form-tarefa">
              <div class="mb-3">
                <label for="titulo" class="form-label">Título</label>
                <input type="text" id="titulo" class="form-control" required />
              </div>

              <div class="mb-3">
                <label for="descricao" class="form-label">Descrição</label>
                <textarea id="descricao" class="form-control" rows="4"></textarea>
              </div>

              <button type="submit" class="btn btn-primary w-100">
                Guardar tarefa
              </button>
            </form>
          </div>
        </div>
      </div>

      <div class="col-lg-8">
        <div
          id="mensagem-edicao-bloqueada"
          class="alert alert-warning alerta-edicao d-none mb-3"
          role="alert"
        >
          Esta tarefa está concluída. Reabra a tarefa para poder editar.
        </div>

        <div class="card shadow-sm border-0">
          <div class="card-body">
            <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3 mb-3">
              <h2 class="h4 mb-0">Lista de tarefas</h2>

              <div class="d-flex gap-2 flex-wrap">
                <button class="btn btn-sm btn-dark filtro-btn" data-filtro="todas">Todas</button>
                <button class="btn btn-sm btn-outline-dark filtro-btn" data-filtro="pendentes">Pendentes</button>
                <button class="btn btn-sm btn-outline-dark filtro-btn" data-filtro="concluidas">Concluídas</button>

                <button id="btn-recarregar" class="btn btn-sm btn-outline-secondary" title="Recarregar">
                  <span class="d-none d-sm-inline">
                    <i class="bi bi-arrow-clockwise"></i> Recarregar
                  </span>
                  <span class="d-inline d-sm-none">
                    <i class="bi bi-arrow-clockwise"></i>
                  </span>
                </button>
              </div>
            </div>

            <ul id="lista-tarefas" class="list-group lista-tarefas"></ul>
          </div>
        </div>
      </div>
    </div>
  </main>

  <div class="modal fade" id="modal-editar-tarefa" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content border-0 shadow">
        <div class="modal-header">
          <h5 class="modal-title">Editar tarefa</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
        </div>

        <div class="modal-body">
          <form id="form-editar-tarefa">
            <input type="hidden" id="editar-id" />

            <div class="mb-3">
              <label for="editar-titulo" class="form-label">Título</label>
              <input type="text" id="editar-titulo" class="form-control" required />
            </div>

            <div class="mb-3">
              <label for="editar-descricao" class="form-label">Descrição</label>
              <textarea id="editar-descricao" class="form-control" rows="4"></textarea>
            </div>
          </form>
        </div>

        <div class="modal-footer">
          <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">
            Cancelar
          </button>
          <button type="submit" form="form-editar-tarefa" class="btn btn-primary">
            Guardar alterações
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/app.js"></script>
</body>
</html>
